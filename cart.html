<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart | Suit Bazar</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <nav class="navbar active-nav">
        <div class="logo"><img src="logo.png" alt="Suit Bazar"></div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="index.html#collection">Collection</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
        <div class="nav-icons">
            <div class="cart-icon" onclick="window.location.href='cart.html'">
                <i class="fas fa-shopping-bag"></i>
                <span class="cart-badge" id="cart-badge">0</span>
            </div>
            <div class="menu-icon">
                <i class="fas fa-bars"></i>
            </div>
        </div>
    </nav>

    <div id="toast-container"></div>

    <section class="cart-section">
        <div class="cart-container">
            <h2>Your Shopping Cart</h2>
            <div class="cart-layout">
                <div class="cart-items" id="cart-items-container">
                    <!-- Cart items injected by JS -->
                </div>
                
                <div class="cart-summary">
                    <h3>Order Summary</h3>
                    <div class="summary-line">
                        <span>Subtotal</span>
                        <span id="cart-subtotal">Rs. 0</span>
                    </div>
                    <div class="summary-line">
                        <span>Shipping</span>
                        <span>Free</span>
                    </div>
                    <div class="summary-line total">
                        <span>Total</span>
                        <span id="cart-total">Rs. 0</span>
                    </div>
                    
                    <h3 class="checkout-heading">Checkout Details</h3>
                    <form id="checkout-form" onsubmit="processCheckout(event)">
                        <div class="form-group">
                            <input type="text" id="chk-name" placeholder="Full Name" required>
                        </div>
                        <div class="form-group">
                            <input type="email" id="chk-email" placeholder="Email Address" required>
                        </div>
                        <div class="form-group">
                            <input type="tel" id="chk-phone" placeholder="Phone Number" required>
                        </div>
                        <div class="form-group">
                            <textarea id="chk-address" rows="3" placeholder="Shipping Address" required></textarea>
                        </div>
                        <div class="form-group">
                            <select id="chk-payment" required>
                                <option value="cod">Cash on Delivery (COD)</option>
                                <option value="card">Credit / Debit Card</option>
                            </select>
                        </div>
                        <button type="submit" class="btn checkout-btn">Complete Order</button>
                    </form>
                </div>
            </div>
        </div>
    </section>

    <footer>
        <div class="footer-content">
            <div class="footer-logo"><img src="logo.png" alt="Suit Bazar"></div>
            <p>&copy; 2026 Suit Bazar. All Rights Reserved.</p>
            <div class="socials">
                <i class="fab fa-instagram"></i>
                <i class="fab fa-facebook-f"></i>
                <i class="fab fa-twitter"></i>
            </div>
        </div>
    </footer>
    <script src="script.js"></script>
</body>
</html>
